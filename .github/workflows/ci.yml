name: CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test -- --runInBand 2>&1 | tee test-output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 3

      - name: Fail when tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
